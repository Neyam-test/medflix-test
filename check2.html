<!DOCTYPE html>
<html>
<head>
    <title>Syntax Checker 2</title>
</head>
<body>
    <h1>Syntax Check Output 2</h1>
    <div id="errors" style="color:red; font-family:monospace;"></div>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            var msgEl = document.createElement('div');
            msgEl.textContent = "Error: " + msg + " at Line " + line + ", Col " + col;
            document.getElementById('errors').appendChild(msgEl);
            document.title = "ERROR_FOUND";
            return false;
        };
    </script>
    <script>
        // Use XHR to eval to catch exact line
        fetch('medflix-admin.html').then(r=>r.text()).then(html => {
            var match = [...html.matchAll(/<script[^>]*>([\s\S]*?)<\/script>/g)];
            if(match.length > 0) {
               var script = match[match.length - 1][1];
               var scriptEl = document.createElement('script');
               scriptEl.textContent = script;
               document.body.appendChild(scriptEl);
            }
        });
    </script>
    <script>
        setTimeout(() => {
            if (document.title !== "ERROR_FOUND") {
                document.getElementById('errors').innerHTML = "No global syntax errors found.";
            }
        }, 3000);
    </script>
</body>
</html>
