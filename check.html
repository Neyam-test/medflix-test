<!DOCTYPE html>
<html>
<head>
    <title>Syntax Checker</title>
</head>
<body>
    <h1>Syntax Check Output</h1>
    <div id="errors" style="color:red; font-family:monospace;"></div>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            var msgEl = document.createElement('div');
            msgEl.textContent = "Error: " + msg + " at Line " + line + ", Col " + col;
            document.getElementById('errors').appendChild(msgEl);
            document.title = "ERROR_FOUND";
            return false;
        };
    </script>
    <script src="medflix-admin.html"></script>
    <script>
        setTimeout(() => {
            if (document.title !== "ERROR_FOUND") {
                document.getElementById('errors').innerHTML = "No global syntax errors found.";
            }
        }, 3000);
    </script>
</body>
</html>
